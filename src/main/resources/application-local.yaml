server:
  port: 8080

spring:
  application:
    name: spring-with-otel
  docker:
    compose:
      enabled: true
      stop:
        command: down

management:
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    access:
      default: unrestricted
    web:
      exposure:
        include: "*"
  endpoint:
    configprops:
      # WARNING: SECURITY RISK - DO NOT USE IN PRODUCTION ENVIRONMENT
      # This configuration exposes sensitive data and should only be used for development or testing purposes.
      # Ensure this is disabled in any environment where security is a concern.
      show-values: ALWAYS
    health:
      probes:
        enabled: true
      show-details: always
    prometheus:
      access: unrestricted
    env:
      show-values: ALWAYS
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    git:
      enabled: true
      mode: full

  tracing:
    enabled: true   # enable tracing
  # export to OTel Collector ---
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
      export:
        enabled: false
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
        enabled: false
        step: 60s
    logging:
      endpoint: http://localhost:4318/v1/logs
      export:
        enabled: false

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://localhost:4318
  metrics:
    exporter: otlp
  traces:
    exporter: otlp
    sampler:
      arg: 1.0
  logs:
    exporter: otlp
  instrumentation:
    logback-mdc:
      add-baggage: true
      enabled: true
    micrometer:
      enabled: true
    annotations:
      enabled: true
    common:
      default-enabled: true
  propagators:
    - baggage
    - tracecontext
